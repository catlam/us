<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Em có thiệp gửi chị 🌿</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #f7f4f0; overflow-x: hidden; position: relative;
  }
  .float-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .fitem { position: absolute; font-size: 20px; opacity: 0; animation: floatRise 7s infinite ease-in-out; }
  @keyframes floatRise {
    0%   { transform: translateY(60px) scale(0.9); opacity: 0; }
    20%  { opacity: 0.18; }
    80%  { opacity: 0.12; }
    100% { transform: translateY(-100px) scale(1.1); opacity: 0; }
  }
  .scene { position: relative; z-index: 10; width: 100%; max-width: 360px; padding: 24px 20px 40px; display: flex; flex-direction: column; align-items: center; }
  .loading { text-align: center; color: #9e8e84; font-size: 15px; }
  .loading .dot { display: inline-block; animation: blink 1.2s infinite; }
  .loading .dot:nth-child(2){ animation-delay:.2s } .loading .dot:nth-child(3){ animation-delay:.4s }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
  .empty { text-align: center; color: #b5a89e; font-size: 15px; line-height: 1.8; }
  .empty .ico { font-size: 48px; display: block; margin-bottom: 12px; }
  .env-wrap { display: flex; flex-direction: column; align-items: center; cursor: pointer; user-select: none; }
  .envelope { width: 210px; height: 150px; position: relative; animation: gentleRock 3s ease-in-out infinite; }
  @keyframes gentleRock { 0%,100%{transform:rotate(-1.5deg)} 50%{transform:rotate(1.5deg)} }
  .env-body { width:100%;height:100%;border-radius:12px;background:#e8e2db;border:1px solid #d5cec5;position:relative;overflow:hidden;box-shadow:0 8px 30px rgba(80,60,40,0.12); }
  .env-flap { position:absolute;top:0;left:0;right:0;height:50%;background:#ddd5cb;clip-path:polygon(0 0,50% 58%,100% 0);transform-origin:top center;transition:transform 0.6s ease;border-bottom:1px solid #cbc3b8; }
  .env-icon { position:absolute;top:22px;left:50%;transform:translateX(-50%);font-size:30px;z-index:2; }
  .env-wrap span { margin-top:20px;font-size:14px;color:#8a7a6e;font-weight:500;text-align:center;animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .card-reveal { display:none;flex-direction:column;align-items:center;width:100%;animation:cardIn 0.7s cubic-bezier(0.34,1.5,0.64,1); }
  @keyframes cardIn { from{transform:scale(0.6) translateY(30px);opacity:0} to{transform:scale(1);opacity:1} }
  .love-card { width:100%;border-radius:24px;padding:36px 24px 28px;text-align:center;background:#f0ebe5;border:1px solid #ddd5cb;box-shadow:0 10px 36px rgba(80,60,40,0.1);margin-bottom:20px;position:relative;overflow:hidden; }
  .love-card::before { content:'';position:absolute;inset:0;border-radius:24px;background:rgba(255,255,255,0.45); }
  .love-card > * { position:relative;z-index:1; }
  .cs { font-size:66px;line-height:1;display:block;margin-bottom:14px;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.3s both; }
  @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
  .cm { font-size:17px;color:#4a3f38;line-height:1.7;font-style:italic;font-weight:400;animation:fadeUp 0.5s ease 0.6s both; }
  @keyframes fadeUp { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }
  .from { font-size:12px;color:#9e8e84;margin-top:16px;letter-spacing:0.4px;animation:fadeUp 0.5s ease 0.9s both; }
  .reacts { display:flex;gap:10px;justify-content:center;flex-wrap:wrap;animation:fadeUp 0.4s ease 1.1s both; }
  .rbtn { padding:9px 16px;border-radius:40px;border:1px solid #ddd5cb;background:#fff;font-size:20px;cursor:pointer;transition:transform 0.15s; }
  .rbtn:active { transform:scale(1.3); }
  .hint { font-size:12px;color:#b5a89e;text-align:center;margin-top:10px;animation:fadeUp 0.4s ease 1.3s both; }
  .action-row { display:flex;gap:8px;margin-top:16px;width:100%;animation:fadeUp 0.4s ease 1.4s both; }
  .action-btn { flex:1;padding:10px;border-radius:12px;border:1px solid #ddd5cb;background:#fff;font-size:13px;color:#5c4f47;cursor:pointer;transition:background 0.15s; }
  .action-btn:active { background:#f0ebe5; }
  .history-box { width:100%;margin-top:12px;display:none;flex-direction:column;gap:8px; }
  .history-item { background:#fff;border:1px solid #ede8e3;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.15s; }
  .history-item:active { background:#f7f4f0; }
  .new-badge { background:#3d3530;color:#f7f4f0;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:10px;display:none;cursor:pointer; }
  .cp { position:fixed;width:8px;height:8px;border-radius:2px;animation:fall 3s ease-in forwards;pointer-events:none;z-index:99; }
  @keyframes fall { 0%{transform:translateY(-10px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(540deg);opacity:0} }
</style>
</head>
<body>
<div class="float-bg" id="floatBg"></div>
<div class="scene" id="scene">
  <div class="loading" id="loading">
    <span class="dot">●</span><span class="dot">●</span><span class="dot">●</span>
  </div>
</div>

<script>
  const SUPA_URL = 'https://qhouzovahpqafdwnfqas.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFob3V6b3ZhaHBxYWZkd25mcWFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Njg0NTgsImV4cCI6MjA5NzI0NDQ1OH0.kouel9JRVgm-vyWB-lBJW7UQBjbVjLSGyjBHgpib-0E';

  const items = ['🌸','🌿','✨','🌷','⭐','🦋','🌼'];
  const fb = document.getElementById('floatBg');
  items.forEach((e,i) => {
    const el=document.createElement('span'); el.className='fitem'; el.textContent=e;
    el.style.left=(8+i*13)+'%'; el.style.bottom='5%';
    el.style.animationDelay=(i*1.1)+'s'; el.style.animationDuration=(6+i*0.6)+'s';
    fb.appendChild(el);
  });

  let latestId = null;
  let historyOpen = false;

  async function fetchLatest() {
    const res = await fetch(`${SUPA_URL}/rest/v1/messages?order=id.desc&limit=1`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
    });
    const data = await res.json();
    return data && data.length ? data[0] : null;
  }

  async function fetchAll() {
    const res = await fetch(`${SUPA_URL}/rest/v1/messages?order=id.desc&limit=20`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
    });
    return await res.json();
  }

  async function init() {
    const msg = await fetchLatest();
    document.getElementById('loading').remove();
    if (!msg) {
      document.getElementById('scene').innerHTML = `<div class="empty"><span class="ico">🌿</span>Chưa có thiệp nào từ em cả<br><span style="font-size:13px;color:#c8bfb8">Đợi em gửi nha chị 💕</span></div>`;
      return;
    }
    latestId = msg.id;
    showEnvelope(msg);
    setInterval(async () => {
      const m = await fetchLatest();
      if (m && m.id !== latestId) {
        latestId = m.id;
        const badge = document.getElementById('newBadge');
        if (badge) { badge.style.display='block'; badge._msg=m; }
      }
    }, 10000);
  }

  function showEnvelope(msg) {
    const scene = document.getElementById('scene');
    scene.innerHTML = `
      <div class="new-badge" id="newBadge" onclick="loadNew()">✨ Có thư mới từ em!</div>
      <div class="env-wrap" id="envWrap" onclick="openCard()">
        <div class="envelope">
          <div class="env-body">
            <div class="env-flap" id="flap"></div>
            <div class="env-icon">🌿</div>
          </div>
        </div>
        <span>Nhấn để mở thiệp của em ✨</span>
      </div>
      <div class="card-reveal" id="reveal">
        <div class="love-card" style="background:${msg.bg||'#f0ebe5'}">
          <span class="cs">${msg.sticker||'🌿'}</span>
          <div class="cm">${msg.message||''}</div>
          <div class="from">— em gửi chị 🌸</div>
        </div>
        <div class="reacts">
          <button class="rbtn" onclick="react('😍')">😍</button>
          <button class="rbtn" onclick="react('🥰')">🥰</button>
          <button class="rbtn" onclick="react('🫂')">🫂</button>
          <button class="rbtn" onclick="react('💕')">💕</button>
        </div>
        <div class="hint" id="hint">Nhấn để phản ứng nhé chị 🌿</div>
        <div class="action-row">
          <button class="action-btn" onclick="reloadLatest()">🔄 Xem thư mới</button>
          <button class="action-btn" onclick="toggleHistory()">📜 Lịch sử thư</button>
        </div>
        <div class="history-box" id="historyBox"></div>
      </div>`;
  }

  function loadNew() {
    const badge = document.getElementById('newBadge');
    if (badge && badge._msg) { showEnvelope(badge._msg); }
  }

  async function reloadLatest() {
    const m = await fetchLatest();
    if (m) { latestId = m.id; showEnvelope(m); }
  }

  async function toggleHistory() {
    const box = document.getElementById('historyBox');
    if (!box) return;
    historyOpen = !historyOpen;
    if (!historyOpen) { box.style.display='none'; return; }
    box.style.display='flex';
    box.innerHTML='<div style="font-size:13px;color:#b5a89e;text-align:center;padding:8px">Đang tải...</div>';
    const data = await fetchAll();
    if (!data.length) { box.innerHTML='<div style="font-size:13px;color:#b5a89e;text-align:center;padding:8px">Chưa có thư nào 🌿</div>'; return; }
    box.innerHTML = data.map((m, i) => `
      <div class="history-item" onclick='pickHistory(${JSON.stringify(m)})'>
        <span style="font-size:24px">${m.sticker||'🌿'}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;color:#5c4f47;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.message||'(không có lời nhắn)'}</div>
          <div style="font-size:11px;color:#b5a89e;margin-top:2px">Thư ${data.length - i}</div>
        </div>
      </div>`).join('');
  }

  function pickHistory(m) {
    showEnvelope(m);
    historyOpen = false;
  }

  function openCard() {
    document.getElementById('flap').style.transform='rotateX(180deg)';
    const w=document.getElementById('envWrap');
    setTimeout(()=>{ w.style.transition='all 0.4s';w.style.transform='scale(0)';w.style.opacity='0'; },400);
    setTimeout(()=>{ w.style.display='none'; document.getElementById('reveal').style.display='flex'; confetti(); },800);
  }

  function confetti() {
    const cols=['#d5cec5','#b5c9b5','#b5c0ce','#c9c0b5','#c0b5c9','#c9c9b5'];
    for(let i=0;i<45;i++) setTimeout(()=>{
      const c=document.createElement('div'); c.className='cp';
      c.style.left=Math.random()*100+'vw';
      c.style.background=cols[Math.floor(Math.random()*cols.length)];
      c.style.animationDuration=(2+Math.random()*2)+'s';
      c.style.animationDelay=Math.random()*0.4+'s';
      document.body.appendChild(c); setTimeout(()=>c.remove(),4000);
    },i*35);
  }

  function react(e) {
    const fly=document.createElement('span');
    fly.textContent=e;
    fly.style.cssText=`position:fixed;font-size:28px;z-index:99;pointer-events:none;left:${38+Math.random()*24}%;bottom:35%;animation:floatRise 2s ease forwards;`;
    document.body.appendChild(fly); setTimeout(()=>fly.remove(),2000);
    document.getElementById('hint').textContent='Chị vừa gửi '+e+' về cho em rồi 💕';
  }

  init();
</script>
</body>
</html>
